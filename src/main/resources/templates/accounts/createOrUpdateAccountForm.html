<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'customers')}">

<body>

  <h2>
    <th:block th:if="${account['new']}" th:text="#{new}">New </th:block>
    <span th:text="#{account}">Account</span>
  </h2>
  <form th:object="${account}" class="form-horizontal" method="post">
    <input type="hidden" name="id" th:value="*{id}" />
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{customer}">Customer</label>
        <div class="col-sm-10">
          <span th:text="${customer?.firstName + ' ' + customer?.lastName}" />
        </div>
      </div>
      <input th:replace="~{fragments/inputField :: input (#{accountNumber}, 'accountNumber', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{openedDate}, 'openedDate', 'date')}" />
      <input th:replace="~{fragments/selectField :: select (#{type}, 'type', ${types})}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${account['new']} ? #{addAccount} : #{updateAccount}" class="btn btn-primary"
          type="submit" th:text="${text}">Add Account</button>
      </div>
    </div>
  </form>

</body>

</html>
