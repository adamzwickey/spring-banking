{{- if .Values.database.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "banking.dbFullname" . }}
  labels:
    {{- include "banking.labels" . | nindent 4 }}
type: servicebinding.io/postgresql
stringData:
  type: "postgresql"
  provider: "postgresql"
  host: {{ include "banking.dbFullname" . | quote }}
  port: {{ .Values.database.service.port | quote }}
  database: {{ .Values.database.name | quote }}
  username: {{ .Values.database.username | quote }}
  password: {{ .Values.database.password | quote }}
{{- end }}
