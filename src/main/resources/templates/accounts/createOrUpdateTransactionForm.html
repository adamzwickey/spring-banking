<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'customers')}">

<body>

  <h2>
    <th:block th:if="${transaction['new']}" th:text="#{new}">New </th:block>
    <span th:text="#{transaction}">Transaction</span>
  </h2>

  <b th:text="#{account}">Account</b>
  <table class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{accountNumber}">Account Number</th>
        <th th:text="#{type}">Type</th>
        <th th:text="#{balance}">Balance</th>
        <th th:text="#{customer}">Customer</th>
      </tr>
    </thead>
    <tr>
      <td th:text="${account.accountNumber}"></td>
      <td th:text="${account.type}"></td>
      <td th:text="${'$' + #numbers.formatDecimal(account.balance, 1, 2)}"></td>
      <td th:text="${customer?.firstName + ' ' + customer?.lastName}"></td>
    </tr>
  </table>

  <form th:object="${transaction}" class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{transactionType}">Type</label>
        <div class="col-sm-10">
          <select class="form-control" th:field="*{transactionType}">
            <option value="DEPOSIT" th:text="#{deposit}">Deposit</option>
            <option value="WITHDRAWAL" th:text="#{withdrawal}">Withdrawal</option>
          </select>
        </div>
      </div>
      <input th:replace="~{fragments/inputField :: input (#{amount}, 'amount', 'number')}" />
      <input th:replace="~{fragments/inputField :: input (#{description}, 'description', 'text')}" />
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <input type="hidden" name="accountId" th:value="${account.id}" />
        <button class="btn btn-primary" type="submit" th:text="#{addTransaction}">Add Transaction</button>
      </div>
    </div>
  </form>

  <br />
  <b th:text="#{previousTransactions}">Previous Transactions</b>
  <table class="table table-striped">
    <tr>
      <th th:text="#{date}">Date</th>
      <th th:text="#{transactionType}">Type</th>
      <th th:text="#{amount}">Amount</th>
      <th th:text="#{description}">Description</th>
    </tr>
    <tr th:if="${!transaction['new']}" th:each="txn : ${account.transactions}">
      <td th:text="${#temporals.format(txn.date, 'yyyy-MM-dd')}"></td>
      <td th:text="${txn.transactionType}"></td>
      <td th:text="${'$' + #numbers.formatDecimal(txn.amount, 1, 2)}"></td>
      <td th:text="${txn.description}"></td>
    </tr>
  </table>

</body>

</html>
