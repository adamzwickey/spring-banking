name: Upgrade Spring Dependencies
on:
  schedule:
    - cron: '0 0 * * 4' # Runs every Thursday at midnight
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Claude Code to Upgrade
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are performing a dependency upgrade this applicationt. Follow these steps carefully:

            1. Use the dependency-manager sub-agent to evaluate and manage the changes changes.  **Upgrade incrementally**: If the current version is more than one major version behind, upgrade one major version at a time and verify the build compiles between each step.

            2. **Respect the Spring Boot BOM**: If the project uses spring-boot-starter-parent or spring-boot-dependencies BOM, upgrade the parent/BOM version FIRST. Then only explicitly override individual dependency versions if the project already does so.

            3. **Evaluate optimizations**: Use the spring-boot-engineer agent to determine if there are additional optizations or changes that are needed to support the upgrade.  It may be helpful to use Context7 to understand new features.  

            4. **Build verification**: After making changes, run `./mvnw clean verify -B` (batch mode). If the build fails:
               - Read the error output carefully
               - Check if it's a breaking API change and attempt to fix it
               - If you cannot resolve the issue, revert that specific upgrade and note it in the PR description
               - Re-run the build to confirm the project is in a passing state

            6. **Create a clear PR description** that includes:
               - A summary table of dependencies upgraded (old version → new version)
               - Any dependencies that were skipped and why
               - Any code changes required to fix breaking API changes
               - A note to review the Spring Boot release notes for any behavioral changes

            Do NOT upgrade non-Spring dependencies unless they are required for compatibility with the new Spring versions.

          claude_args: |
            --model sonnet
            --dangerously-skip-permissions
            --mcp-config '{"mcpServers": {"context7": {"command": "npx", "args": ["-y", "@upstash/context7-mcp@latest"]}}}'
            --allowedTools "Bash,Read,Write,Edit,mcp__context7__*"
