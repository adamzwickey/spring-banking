<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'customers')}">

<body>

  <h2 th:text="#{customerInformation}">Customer Information</h2>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>

  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <table class="table table-striped" th:object="${customer}">
    <tr>
      <th th:text="#{name}">Name</th>
      <td><b th:text="*{firstName + ' ' + lastName}"></b></td>
    </tr>
    <tr>
      <th th:text="#{email}">Email</th>
      <td th:text="*{email}"></td>
    </tr>
    <tr>
      <th th:text="#{phone}">Phone</th>
      <td th:text="*{phone}"></td>
    </tr>
    <tr>
      <th th:text="#{address}">Address</th>
      <td th:text="*{address}"></td>
    </tr>
  </table>

  <a th:href="@{__${customer.id}__/edit}" class="btn btn-primary" th:text="#{editCustomer}">Edit
    Customer</a>
  <a th:href="@{__${customer.id}__/accounts/new}" class="btn btn-primary" th:text="#{addNewAccount}">Add
    New Account</a>

  <br />
  <br />
  <br />
  <h2 th:text="#{accountsAndTransactions}">Accounts and Transactions</h2>

  <table class="table table-striped">

    <tr th:each="account : ${customer.accounts}">
      <td valign="top">
        <dl class="dl-horizontal">
          <dt th:text="#{accountNumber}">Account Number</dt>
          <dd th:text="${account.accountNumber}"></dd>
          <dt th:text="#{openedDate}">Opened Date</dt>
          <dd th:text="${#temporals.format(account.openedDate, 'yyyy-MM-dd')}"></dd>
          <dt th:text="#{type}">Type</dt>
          <dd th:text="${account.type}"></dd>
          <dt th:text="#{balance}">Balance</dt>
          <dd th:text="${'$' + #numbers.formatDecimal(account.balance, 1, 2)}"></dd>
        </dl>
      </td>
      <td valign="top">
        <table class="table-condensed" th:id="${'txn-table-' + account.id}">
          <thead>
            <tr>
              <th th:text="#{transactionDate}">Date</th>
              <th th:text="#{transactionType}">Type</th>
              <th th:text="#{amount}">Amount</th>
              <th th:text="#{description}">Description</th>
            </tr>
          </thead>
          <tr th:each="txn : ${account.transactions}" class="txn-row"
              th:data-date="${#temporals.format(txn.date, 'yyyy-MM-dd')}"
              th:data-description="${txn?.description}"
              th:data-category="${txn.transactionType}"
              th:data-amount="${txn.amount}"
              th:data-balance="${txn.balanceAfter}">
            <td th:text="${#temporals.format(txn.date, 'yyyy-MM-dd')}"></td>
            <td th:text="${txn.transactionType}"></td>
            <td th:text="${'$' + #numbers.formatDecimal(txn.amount, 1, 2)}"></td>
            <td th:text="${txn?.description}"></td>
          </tr>
          <tr>
            <td><a th:href="@{__${customer.id}__/accounts/__${account.id}__/edit}"
                th:text="#{editAccount}">Edit Account</a></td>
            <td><a th:href="@{__${customer.id}__/accounts/__${account.id}__/transactions/new}"
                th:text="#{addTransaction}">Add Transaction</a></td>
            <td>
              <button type="button" class="btn btn-sm btn-outline-secondary export-csv-btn"
                  th:data-account-id="${account.id}"
                  th:disabled="${#lists.isEmpty(account.transactions)}"
                  onclick="exportTransactionsCsv(this)">Export to CSV</button>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  </table>
  <script>
    function hideMessages() {
      setTimeout(function () {
        var successMsg = document.getElementById("success-message");
        var errorMsg = document.getElementById("error-message");
        if (successMsg) successMsg.style.display = "none";
        if (errorMsg) errorMsg.style.display = "none";
      }, 3000);
    }
    hideMessages();

    function escapeCsvField(field) {
      if (field === null || field === undefined) {
        return "";
      }
      var str = String(field);
      if (str.indexOf('"') !== -1 || str.indexOf(',') !== -1 || str.indexOf('\n') !== -1 || str.indexOf('\r') !== -1) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function generateCsv(transactions) {
      var header = "Date,Description,Category,Amount,Balance";
      var lines = [header];
      for (var i = 0; i < transactions.length; i++) {
        var txn = transactions[i];
        lines.push([
          escapeCsvField(txn.date),
          escapeCsvField(txn.description),
          escapeCsvField(txn.category),
          escapeCsvField(txn.amount),
          escapeCsvField(txn.balance)
        ].join(","));
      }
      return lines.join("\n");
    }

    function exportTransactionsCsv(button) {
      var accountId = button.getAttribute("data-account-id");
      var table = document.getElementById("txn-table-" + accountId);
      var rows = table.querySelectorAll("tr.txn-row");
      var transactions = [];
      for (var i = 0; i < rows.length; i++) {
        transactions.push({
          date: rows[i].getAttribute("data-date") || "",
          description: rows[i].getAttribute("data-description") || "",
          category: rows[i].getAttribute("data-category") || "",
          amount: rows[i].getAttribute("data-amount") || "",
          balance: rows[i].getAttribute("data-balance") || ""
        });
      }
      var csv = generateCsv(transactions);
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, "0");
      var dd = String(today.getDate()).padStart(2, "0");
      var filename = "transactions_" + yyyy + "-" + mm + "-" + dd + ".csv";
      var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      var link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }
  </script>

</body>


</html>
