{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "banking.dbFullname" . }}
  labels:
    {{- include "banking.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  ports:
    - port: {{ .Values.database.service.port }}
  selector:
    {{- include "banking.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
{{- end }}
